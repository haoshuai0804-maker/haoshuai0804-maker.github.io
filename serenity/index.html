前收 184.5 万仅小幅回落，说明首发溢价正在被重新定价。"}, {"object": "HBM 行业", "direction": "中性", "strength": "", "reason": "本窗口内未见新的 HBM4/HBM4E 认证、良率、合同价、先进封装或出口限制正式文件；短线承压主要来自交易层面而非基本面新利空。"}, {"object": "AI 基础设施", "direction": "中性", "strength": "", "reason": "美股 AI 硬件链收盘明显分化，`NVDA` 与 `AVGO` 走强，但 `MU`、`AMD`、`MRVL` 回落；同时未检索到云厂商新增资本开支、ASIC 订单或 GPU 出货的官方增量文件。"}, {"object": "具身智能/机器人", "direction": "中性", "strength": "", "reason": "截至执行时点，未发现高可信的新订单、量产、融资、并购、政策或论文催化；赛道若有波动，更可能来自主题情绪而非新增基本面。"}], "bullets": [{"title": "`SKHYV -> SKHY` 已完成切换，但 SK 海力士 ADS 在首个常规交易日显著回吐首发溢价", "text": "Nasdaq 已明确 SKHYV 自 2026-07-13 起切换为常规代码 SKHY，并要求市场数据分发方将历史数据延续到新代码。；SKHY 在 2026-07-13 美股常规交易时段收于 152.35 美元，较 2026-07-10 SKHYV 的 when-issued 收盘 168.01 美元下跌 9.32%，但仍高于 149 美元发行价。；截至 2026-07-14 09:40 KST，000660.KS 约报 1,834,0", "direction": "短线利空；中期中性"}, {"title": "美股 AI 硬件链 7 月 13 日收盘显著分化，当前缺少新的云厂商资本开支或 ASIC 官方增量文件", "text": "2026-07-13 美股收盘中，NVDA 上涨 4.08%，AVGO 上涨 2.71%，但 MU 下跌 4.85%，AMD 下跌 3.20%，MRVL 下跌 12.73%。；截至本次执行时点，针对英伟达、AMD、微软、Meta、亚马逊等官方新闻与新闻稿页面的定向检查，未发现 2026-07-14 00:00 至 08:56 BJT 内新增的资本开支、ASIC 订单、GPU 出货或数据中心项目正式公告。", "direction": "中性偏分化"}, {"title": "HBM/DRAM 基本面在本窗口内无新的正式认证、合同价或出口限制文件，短线判断需要更多依赖价格行为", "text": "本窗口内未检索到新的 HBM4/HBM4E 客户认证、HBM/服务器 DRAM 合同价、先进封装良率、CoWoS 扩产节奏或新增出口限制正式文件。；当前可确认的新增事实主要仍是 SK 海力士美股 regular-way 定价回落，而非产业供需关系出现新拐点。", "direction": "中性"}, {"title": "具身智能/机器人赛道截至执行时点无高可信重大新增，缺少可单独驱动下一交易日重估的硬催化", "text": "本窗口内未发现高可信的新订单、量产、政策、并购或融资公告。；快速检索到的具身智能相关 arXiv 结果最新发布时间仍主要落在 2026-07-10，而非今天窗口内。", "direction": "中性"}], "watch": ["SKHY 能否在下一个美股交易时段重新稳住 149 美元发行价上方，并缩小与韩股的情绪折价。", "美股开盘前是否出现新的 hyperscaler 资本开支、ASIC 订单或 GPU 出货官方文件。", "HBM 合同价、HBM4 认证、CoWoS 扩产或机器人真实订单中，是否有任一正式文件补上今天的“信息真空”。"], "compressed": "- SK 海力士：偏空，核心变量从“上市成功”切换到“首发溢价回吐是否止住”。 - HBM 行业：中性，今天没有新基本面文件，短线强弱更多取决于资金和价格行为。 - AI 基础设施：中性，硬件股分化明显，但缺少云 capex 和 ASIC 新公告来给出统一方向。 - 机器人赛道：中性，无重大新增，继续等待订单、融资和政策的正式落地。  本文仅作信息整理，不构成投资建议。"}, "sources": [{"label": "AI/HBM 与具身智能", "status": "齐全", "detail": "已读取 2026-07-14_AI-HBM与具身智能情报.md（修改时间 2026-07-14 09:01 BJT）。"}, {"label": "Serenity 日报与增量表", "status": "齐全", "detail": "已读取当天日报 2026-07-14-serenity-daily.md（2026-07-14 10:47 BJT）和增量表 2026-07-14-serenity-incremental-table.md（2026-07-14 10:47 BJT）。"}, {"label": "重点股票时间线", "status": "齐全", "detail": "已读取当天逐股时间线 2026-07-14.md（2026-07-14 10:47 BJT）。价格文件修改时间 2026-07-14 10:43 BJT。"}], "run_date": "2026-07-14", "run_time": "2026-07-14 11:21 BJT"};let active=DATA.stocks[0]?.ticker,level='all';const labels={all:'全部',core:'重点',watch:'关注',risk:'风险/低信号',normal:'普通'},badge={core:'重点信号',watch:'持续关注',risk:'风险提醒',normal:'普通记录'};stockCount.textContent=DATA.stocks.length;postCount.textContent=DATA.posts.length;coreCount.textContent=DATA.posts.filter(x=>x.level==='core').length;document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');const v=b.dataset.view;postsView.classList.toggle('active',v==='posts');stocksView.classList.toggle('active',v==='stocks');pageTitle.textContent=v==='posts'?'每日帖子与判断':'重点股票时间线';if(v==='stocks')setTimeout(drawChart,20)});function renderSummary(day){const lines=DATA.conclusions[day]||['当日五行结论尚未生成。'];summaryLines.innerHTML=lines.map(x=>`<li>${x}</li>`).join('')}function renderStocks(){chips.innerHTML=DATA.stocks.map(s=>`<button class="pill ${s.ticker===active?'active':''}" data-t="${s.ticker}">${s.ticker}</button>`).join('');chips.querySelectorAll('button').forEach(b=>b.onclick=()=>{active=b.dataset.t;renderStocks()});const s=DATA.stocks.find(x=>x.ticker===active);stockMeta.innerHTML=`<h3>${s.ticker}</h3><span class="stock-high">${s.name} · 最高价 <b>${s.prices.length?Math.max(...s.prices.map(p=>p.close)).toLocaleString():'待补'} ${s.currency}</b></span>`;timeline.innerHTML=s.events.length?s.events.slice().reverse().map(e=>`<article class="event"><time>${e.date}</time><h4>${e.view}</h4><span class="tag">${e.kind}</span>${e.next_decline?`<div class="decline">↓ 下一交易日下跌 ${Math.abs(e.next_change).toFixed(2)}%</div>`:''}${e.link}</article>`).join(''):'<div class="empty">尚待补齐具体帖子。</div>';setTimeout(drawChart,10)}function drawChart(){const s=DATA.stocks.find(x=>x.ticker===active),c=document.getElementById('priceChart');if(!s||!c||!s.prices.length)return;const rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=rect.width*dpr;c.height=rect.height*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);const W=rect.width,H=rect.height,pad={l:54,r:18,t:14,b:30};const vals=s.prices.map(p=>p.close),lo=Math.min(...vals),hi=Math.max(...vals),span=hi-lo||1;const X=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(1,s.prices.length-1),Y=v=>pad.t+(hi-v)*(H-pad.t-pad.b)/span;x.clearRect(0,0,W,H);x.strokeStyle='#e1e4e7';x.fillStyle='#777';x.font='12px sans-serif';for(let i=0;i<4;i++){const y=pad.t+i*(H-pad.t-pad.b)/3,v=hi-i*span/3;x.beginPath();x.moveTo(pad.l,y);x.lineTo(W-pad.r,y);x.stroke();x.fillText(v.toFixed(2),4,y+4)}x.strokeStyle='#2368d8';x.lineWidth=2;x.beginPath();s.prices.forEach((p,i)=>i?x.lineTo(X(i),Y(p.close)):x.moveTo(X(i),Y(p.close)));x.stroke();const eventDates=new Set(s.events.map(e=>e.price.market_date));s.prices.forEach((p,i)=>{if(eventDates.has(p.date)){x.fillStyle='#e0a124';x.beginPath();x.arc(X(i),Y(p.close),4.5,0,Math.PI*2);x.fill()}});x.fillStyle='#777';x.fillText(s.prices[0].date.slice(5),pad.l,H-8);x.textAlign='right';x.fillText(s.prices.at(-1).date.slice(5),W-pad.r,H-8);x.textAlign='left';chartRange.textContent=`${s.prices[0].date}—${s.prices.at(-1).date} · ${s.currency}`}function renderFeed(){filters.innerHTML=Object.entries(labels).map(([k,v])=>`<button class="pill ${k===level?'active':''}" data-l="${k}">${v}</button>`).join('');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{level=b.dataset.l;renderFeed()});const list=DATA.posts.filter(x=>level==='all'||x.level===level);let day='';feed.innerHTML=list.map(p=>{const d=p.date.slice(0,10),head=d!==day?`<div class="day">${day=d}</div>`:'';return head+`<article class="post card ${p.level}"><div class="post-top"><span class="badge">${badge[p.level]}</span><span>${p.date.replace(d,'')}</span></div><h4>${p.topic}</h4><p>${p.summary}</p><p><b>判断：</b>${p.judgment}</p>${p.link}</article>`}).join('')||'<div class="empty card">当前筛选下没有帖子。</div>';renderSummary((list[0]||DATA.posts[0]||{date:'2026-07-14'}).date.slice(0,10))}function closeDrawer(){drawer.classList.remove('open');drawerShade.classList.remove('open');tweetFrame.src='about:blank'}document.addEventListener('click',e=>{const a=e.target.closest('a[href*="x.com/aleabitoreddit/status/"]');if(!a)return;e.preventDefault();const url=a.href,id=(url.match(/status\/(\d+)/)||[])[1];if(!id)return;externalLink.href=url;tweetFrame.src=`https://platform.twitter.com/embed/Tweet.html?id=${id}&theme=light`;drawer.classList.add('open');drawerShade.classList.add('open')});drawerClose.onclick=closeDrawer;drawerShade.onclick=closeDrawer;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});addEventListener('resize',()=>{if(stocksView.classList.contains('active'))drawChart()});renderStocks();renderFeed();
</script><script>var chartHoverPoints=[];drawChart=function(){const s=DATA.stocks.find(x=>x.ticker===active),c=document.getElementById('priceChart');if(!s||!c||!s.prices.length)return;const rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=rect.width*dpr;c.height=rect.height*dpr;const g=c.getContext('2d');g.scale(dpr,dpr);const W=rect.width,H=rect.height,pad={l:52,r:18,t:25,b:22};const vals=s.prices.map(p=>p.close),lo=Math.min(...vals),hi=Math.max(...vals),span=hi-lo||1;const X=i=>pad.l+i*(W-pad.l-pad.r)/Math.max(1,s.prices.length-1),Y=v=>pad.t+(hi-v)*(H-pad.t-pad.b)/span;g.clearRect(0,0,W,H);g.strokeStyle='#e1e4e7';g.fillStyle='#777';g.font='11px sans-serif';for(let i=0;i<3;i++){const y=pad.t+i*(H-pad.t-pad.b)/2,v=hi-i*span/2;g.beginPath();g.moveTo(pad.l,y);g.lineTo(W-pad.r,y);g.stroke();g.fillText(v.toFixed(2),3,y+4)}g.strokeStyle='#2368d8';g.lineWidth=2;g.beginPath();s.prices.forEach((p,i)=>i?g.lineTo(X(i),Y(p.close)):g.moveTo(X(i),Y(p.close)));g.stroke();const eventDates=new Set(s.events.map(e=>e.price.market_date));chartHoverPoints=[];let labelFlip=0;s.prices.forEach((p,i)=>{if(!eventDates.has(p.date))return;const px=X(i),py=Y(p.close);g.fillStyle='#e0a124';g.beginPath();g.arc(px,py,4.5,0,Math.PI*2);g.fill();g.fillStyle='#8a5700';g.font='bold 11px sans-serif';g.textAlign='center';const ly=labelFlip++%2?py+17:py-10;g.fillText(p.date.slice(5),px,Math.max(11,Math.min(H-5,ly)));chartHoverPoints.push({x:px,y:py,date:p.date,close:p.close,currency:s.currency})});g.textAlign='left'};priceChart.addEventListener('mousemove',e=>{const r=priceChart.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let p=null,dist=Infinity;chartHoverPoints.forEach(q=>{const d=Math.hypot(mx-q.x,my-q.y);if(d<dist){dist=d;p=q}});if(p&&dist<14){chartTooltip.style.display='block';chartTooltip.style.left=p.x+'px';chartTooltip.style.top=p.y+'px';chartTooltip.textContent=`${p.date} · ${Number(p.close).toLocaleString()} ${p.currency}`}else chartTooltip.style.display='none'});priceChart.addEventListener('mouseleave',()=>chartTooltip.style.display='none');</script><script>renderFeed=function(){filters.innerHTML=Object.entries(labels).map(([k,v])=>`<button class="pill ${k===level?'active':''}" data-l="${k}">${v}</button>`).join('');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{level=b.dataset.l;renderFeed()});const list=DATA.posts.filter(x=>level==='all'||x.level===level);const groups=new Map();list.forEach(p=>{const d=p.date.slice(0,10);if(!groups.has(d))groups.set(d,[]);groups.get(d).push(p)});feed.innerHTML=[...groups.entries()].map(([d,items])=>{const lines=(DATA.conclusions[d]||[]).slice(0,5);const summary=`<section class="day-summary card"><h3>五行结论</h3><ol>${lines.map(x=>`<li>${x}</li>`).join('')}</ol></section>`;const cards=items.map(p=>`<article class="post card ${p.level}"><div class="post-top"><span class="badge">${badge[p.level]}</span><span>${p.date.replace(d,'')}</span></div><h4>${p.topic}</h4><p>${p.summary}</p><p><b>判断：</b>${p.judgment}</p>${p.link}</article>`).join('');return `<div class="day">${d}</div>${summary}${cards}`}).join('')||'<div class="empty card">当前筛选下没有帖子。</div>'};renderFeed();</script><script>function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function renderTheme(){const t=DATA.theme;if(!t){themePanel.innerHTML='';return}const overview=(t.overview||[]).map(x=>`<tr><td>${esc(x.object)}</td><td>${esc(x.direction)}</td><td>${esc(x.strength)}</td><td>${esc(x.reason)}</td></tr>`).join('');const bullets=(t.bullets||[]).map(x=>`<article class="theme-item"><h4>${esc(x.title)}</h4><p>${esc(x.text)}</p>${x.direction?`<span>${esc(x.direction)}</span>`:''}</article>`).join('');const watch=(t.watch||[]).map(x=>`<li>${esc(x)}</li>`).join('');themePanel.innerHTML=`<section class="theme-card card"><div class="theme-head"><span>今日主题汇总</span><h3>${esc(t.title)}</h3><p>${esc(t.compressed)}</p></div><div class="theme-grid">${bullets}</div><div class="theme-table"><table><thead><tr><th>对象</th><th>方向</th><th>强度</th><th>核心原因</th></tr></thead><tbody>${overview}</tbody></table></div><div class="theme-watch"><b>次日观察</b><ol>${watch}</ol></div><div class="theme-source">来源：${esc(t.source)}。该模块并入今日看板，不等同于 Serenity 原帖。</div></section>`}renderTheme();</script><script>function renderSources(){const rows=(DATA.sources||[]).map(s=>`<article class="source-card card ${s.status==='齐全'?'ok':'gap'}"><span class="source-status">${esc(s.status)}</span><h3>${esc(s.label)}</h3><p>${esc(s.detail)}</p></article>`).join('');sourcePanel.innerHTML=`<div class="source-note card">运行时间：${esc(DATA.run_time)}。本页只整合本地已生成资料；缺失的今日上游产物明确标注，不用旧资料冒充当天新增。</div><div class="source-grid">${rows}</div>`}renderSources();</script><script>document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');const v=b.dataset.view;themeView.classList.toggle('active',v==='theme');postsView.classList.toggle('active',v==='posts');stocksView.classList.toggle('active',v==='stocks');pageTitle.textContent=v==='theme'?'AI/HBM 与具身智能':(v==='posts'?'每日帖子与判断':'重点股票时间线');if(v==='stocks')setTimeout(drawChart,20)});</script><script>chartToggle.addEventListener('click',()=>{const box=document.querySelector('.stock-sticky'),collapsed=box.classList.toggle('chart-collapsed');chartToggle.textContent=collapsed?'展开':'收起';chartToggle.setAttribute('aria-expanded',String(!collapsed));if(!collapsed)setTimeout(drawChart,20)});document.addEventListener('click',e=>{const a=e.target.closest('a[href*="x.com/aleabitoreddit/status/"]');if(!a)return;const card=a.closest('.post,.event');if(!card){drawerLocal.textContent='';return}const time=card.querySelector('time,.post-top span:last-child')?.textContent?.trim()||'';const title=card.querySelector('h4')?.textContent?.trim()||'';const paragraphs=[...card.querySelectorAll('p')].map(x=>x.textContent.trim()).filter(Boolean);drawerLocal.textContent=[time,title,...paragraphs].filter(Boolean).join('\n\n')},true);</script><script>const appShell=document.querySelector('.app');function setSideCollapsed(collapsed){appShell.classList.toggle('side-collapsed',collapsed);sideToggle.textContent=collapsed?'☰':'←';sideToggle.setAttribute('aria-label',collapsed?'展开菜单':'收起菜单');sideToggle.title=collapsed?'展开菜单':'收起菜单';localStorage.setItem('serenity-side-collapsed',collapsed?'1':'0');setTimeout(()=>{if(stocksView.classList.contains('active')&&!document.querySelector('.stock-sticky')?.classList.contains('chart-collapsed'))drawChart()},230)}setSideCollapsed(localStorage.getItem('serenity-side-collapsed')==='1');sideToggle.addEventListener('click',()=>setSideCollapsed(!appShell.classList.contains('side-collapsed')));</script></body></html>
