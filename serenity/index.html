);priceChart.addEventListener('mouseleave',()=>chartTooltip.style.display='none');</script><script>renderFeed=function(){const escLocal=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));filters.innerHTML=Object.entries(labels).map(([k,v])=>`<button class="pill ${k===level?'active':''}" data-l="${k}">${v}</button>`).join('');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{level=b.dataset.l;renderFeed()});const list=DATA.posts.filter(x=>level==='all'||x.level===level);const groups=new Map();list.forEach(p=>{const d=p.date.slice(0,10);if(!groups.has(d))groups.set(d,[]);groups.get(d).push(p)});const gap=DATA.daily_gap&&level==='all'?`<div class="day">${escLocal(DATA.daily_gap.date)}</div><section class="day-summary card gap-summary"><h3>${escLocal(DATA.daily_gap.title)}</h3><ol>${(DATA.conclusions[DATA.daily_gap.date]||[]).map(x=>`<li>${escLocal(x)}</li>`).join('')}</ol></section>`:'';const history=[...groups.entries()].map(([d,items])=>{const lines=(DATA.conclusions[d]||[]).slice(0,5);const summary=`<section class="day-summary card"><h3>五行结论</h3><ol>${lines.map(x=>`<li>${escLocal(x)}</li>`).join('')}</ol></section>`;const cards=items.map(p=>`<article class="post card ${p.level}"><div class="post-top"><span class="badge">${badge[p.level]}</span><span>${p.date.replace(d,'')}</span></div><h4>${escLocal(p.topic)}</h4><p>${escLocal(p.summary)}</p><p><b>判断：</b>${escLocal(p.judgment)}</p>${p.link}</article>`).join('');return `<div class="day">${escLocal(d)}</div>${summary}${cards}`}).join('');feed.innerHTML=gap+history||'<div class="empty card">当前筛选下没有帖子。</div>';renderSummary(DATA.daily_gap?.date||[...groups.keys()][0]||'__LATEST__')};renderFeed();</script><script>function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function renderTheme(){const t=DATA.theme;if(!t){themePanel.innerHTML='';return}const overview=(t.overview||[]).map(x=>`<t
