    async function inflateBase64Gzip(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      if (!('DecompressionStream' in window)) throw new Error('当前浏览器不支持页面自解压，请升级 Safari/Chrome 后再打开。');
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    }
    inflateBase64Gzip(payload).then((html) => {
      document.open();
      document.write(html);
      document.close();
    }).catch((error) => {
      document.getElementById('status').className = 'err';
      document.getElementById('status').textContent = error.message || '页面打开失败';
    });
  </script>
